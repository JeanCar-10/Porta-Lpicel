<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rayo 5 | LapiCels</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ==========================================
   RESET
========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:'Baloo 2', cursive;

    background:#efefef;

    min-height:100vh;

    display:flex;

    flex-direction:column;

    overflow-x:hidden;
}

/* ==========================================
   HEADER
========================================== */

header{

    position:fixed;

    top:0;
    left:0;

    width:100%;

    background:rgba(118,154,118,0.95);

    backdrop-filter:blur(8px);

    padding:10px 30px;

    z-index:9999;

    transition:all .35s ease;

    box-shadow:0 2px 15px rgba(0,0,0,.08);
}

.logo-container{

    display:flex;

    align-items:center;

    gap:18px;
}

.logo-container img{

    width:75px;

    height:auto;
}

.logo-container a{

    text-decoration:none;

    color:white;

    font-size:3rem;

    font-weight:700;
}

/* ==========================================
   CONTENIDO VACÍO
========================================== */

main{

    flex:1;

    margin-top:95px;
}

/* ==========================================
   FOOTER
========================================== */

footer{

    background:#9cab91;

    text-align:center;

    padding:28px 20px;

    font-size:2rem;

    font-weight:700;
}

footer span{

    color:white;
}

/* ==========================================
   RESPONSIVE
========================================== */

@media(max-width:768px){

    .logo-container img{

        width:55px;
    }

    .logo-container a{

        font-size:2rem;
    }

    footer{

        font-size:1.2rem;
    }
}

</style>

</head>

<body>

<!-- ==========================================
     HEADER
========================================== -->

<header>

    <div class="logo-container">

        <img src="img/logo.png" alt="Logo">

        <a href="index.html">LapiCels</a>

    </div>

</header>

<!-- ==========================================
     CONTENIDO VACÍO
========================================== -->

<main>

</main>

<!-- ==========================================
     FOOTER
========================================== -->

<footer>

    Nos reservamos los derechos de autor

    <span>Los Audaces</span>

</footer>

<script>

window.addEventListener('scroll',function(){

    const header = document.querySelector('header');

    if(window.scrollY > 50){

        header.style.padding = "5px 30px";
        header.style.background = "rgba(118,154,118,0.98)";
        header.style.boxShadow = "0 8px 25px rgba(0,0,0,.15)";

    }else{

        header.style.padding = "10px 30px";
        header.style.background = "rgba(118,154,118,0.95)";
        header.style.boxShadow = "0 2px 15px rgba(0,0,0,.08)";

    }

});

</script>

</body>
</html>
