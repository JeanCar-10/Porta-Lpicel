<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Porta Lapicel</title>

<link rel="icon" type="image/png" href="img/logo.png">

<!-- =========================
     FUENTES
========================= -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

@font-face{

    font-family:"PortaFuente";

    src:url("fonts/ClickerScript-Regular.ttf") format("truetype");

    font-weight:normal;

    font-style:normal;

}








/* ===================================================
   RESET GENERAL
=================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Baloo 2', cursive;

    background:#ffffff;

    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;

    left:0;
    top:150px;

    width:170px;
    height:calc(100vh - 80px);

    background-image:url('img/lapizgrandeizq.png');
    background-repeat:no-repeat;
    background-position:top left;
    background-size:contain;

    pointer-events:none;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;

    right:0;
    top:190px;

    width:170px;
    height:calc(100vh - 80px);

    background-image:url('img/lapizgrandeder.png');
    background-repeat:no-repeat;
    background-position:top right;
    background-size:contain;

    pointer-events:none;
    z-index:0;
}






html{
    scroll-behavior:smooth;
}





/* Todo el contenido encima */




/* ===================================================
   HEADER
=================================================== */
header{
    width:100%;
    background:#f9f2df;
    padding:10px 30px;



    position:fixed;

    top:0;
    left:0;

    width:100%;

    background:rgba(242, 234, 208);

    backdrop-filter:blur(8px);

    padding:10px 30px;

    z-index:99999;

    transition:all .35s ease;

    box-shadow:0 2px 15px rgba(0,0,0,.08);
}




.logo-container{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo-container img{
    width:50px;
    height:auto;
}

.logo-container a{
    text-decoration:none;
    color:#5C5C43;
    font-size:50px;
    font-family:"PortaFuente", cursive;
    font-weight:700;

}

/* ===================================================
   SECCIÓN PRINCIPAL
=================================================== */
.hero{
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:120px 20px 40px;
}


/* ===================================================
   IMÁGENES LATERALES
=================================================== */



/* ===================================================
   TÍTULO
=================================================== */

.titulo{
    font-size:5.5rem;
    line-height:1.35;
    font-weight:800;
    margin-bottom:60px;
}

.verde{
    color:#24b038;
}

.rosa{
    color:#f29bc5;
}

.amarillo{
    color:#efb544;
}

.rosafuerte{
    color:#df2b72;
}

.naranja{
    color:#f1732c;
    font-family:"PortaFuente", cursive;
    font-size:9.2rem;
}

.azul{
    color:#73add8;
    font-family:"PortaFuente", cursive;
    font-size:9.2rem;
}

.morado{
    color:#B777BD;
    font-family:"PortaFuente", cursive;
    font-size:9.2rem;
}

/* ===================================================
   BOTÓN COMENZAMOS
=================================================== */

.btn-comenzar{
    text-decoration:none;

    background:#80ac83;
    color:white;

    font-size:2.4rem;
    font-weight:800;

    padding:18px 80px;

    border-radius:35px;

    transition:.3s;

    animation: palpitar 1.5s infinite;
}

.btn-comenzar:hover{
    transform:scale(1.08);
}



/* ===================================
   MODELOS
=================================== */

#modelos{

    padding:130px 200px 140px;

    background:#ffffff;

    text-align:center;
}

.titulo-modelos{

    font-size:3.5rem;

    margin-bottom:70px;

    color:black;

    font-weight:700;
}

.contenedor-modelos{

    max-width:1100px;

    margin:auto;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:50px;
}

.modelo-card:last-child{
    grid-column:2;
}

/* TARJETAS */


#hello-color{
    background: #F7CBDD;
}
#batman-color{
    background: #F2D049;
}
#snoopy-color{
    background: #E35656;
}
#jp-color{
    background: #88A685;
}

#amaranta-color{
    background: #C9ABD4;
}
#corazon-color{
    background: #F57685;
}
#panda-color{
    background: #F5F2F2;
}



.modelo-card{

    background:#C9ABD4;

    border-radius:35px; 

    overflow:hidden;

    cursor:pointer;

    animation: palpitarRayo 2s infinite;

    position:relative;

    z-index:2;


    text-decoration:none;
    color:black;
}

.modelo-card img{

    width:100%;

    height:230px;

    object-fit:cover;

    display:block;
}

.modelo-card h3{

    padding:18px;

    font-size:1.8rem;

    font-weight:700;
}





/* ==========================================
   QUITAR CUADRO CELESTE AL TOCAR PASOS
========================================== */


.modelo-card{

    -webkit-tap-highlight-color:transparent;

    user-select:none;

    -webkit-user-select:none;

}



.modelo-card img{

    -webkit-tap-highlight-color:transparent;

    user-select:none;

    -webkit-user-select:none;

    -webkit-user-drag:none;

}















/* Animación */

@keyframes palpitarRayo{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.04);
    }

    100%{
        transform:scale(1);
    }

}

/* Hover */

.modelo-card:hover{

    transform:scale(1.08);

    transition:.3s;
}




































/* Animación */
@keyframes palpitar{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* ===================================================
   RESPONSIVE TABLET
=================================================== */

@media(max-width:900px){

    .titulo{
        font-size:4rem;
    }

    .lapiz-iz,
    .lapiz-der{
        width:160px;
    }

    .btn-comenzar{
        font-size:2rem;
        padding:16px 60px;
    }

}

/* ===================================================
   RESPONSIVE CELULAR
=================================================== */

@media(max-width:600px){

    .logo-container img{
        width:55px;
    }

    .logo-container a{
        font-size:3.3rem;
    }

    .titulo{
        font-size:2.8rem;
        margin-bottom:40px;
    }

    .lapiz-iz{
        width:100px;
        left:-25px;
        top:120px;
    }

    .lapiz-der{
        width:100px;
        right:-25px;
        top:260px;
    }

    .btn-comenzar{
        font-size:1.4rem;
        padding:14px 35px;
    }

    footer{

        font-size:1.2rem;
    }


/* LAPICES LATERALES MAS PEQUEÑOS */

    body::before{

        width:90px;

        top:120px;

        left:-15px;

        background-size:contain;

    }


    body::after{

        width:90px;

        top:180px;

        right:-15px;

        background-size:contain;

    }



    /* PORTADA */

    .titulo{

        font-size:3.9rem;

        line-height:1.2;

        padding:0 30px;

    }

    .naranja{
    color:#f1732c;
    font-family:"PortaFuente", cursive;
    font-size:5.2rem;
}

    .azul{
    color:#73add8;
    font-family:"PortaFuente", cursive;
    font-size:5.2rem;
}

    .morado{
    color:#B777BD;
    font-family:"PortaFuente", cursive;
    font-size:5.2rem;
}






    .btn-comenzar{

        font-size:1.3rem;

        padding:15px 35px;

    }



    /* SECCION MODELOS */

    #modelos{

        padding:150px 30px 80px;

    }


    .titulo-modelos{

        font-size:2rem;

        line-height:1.2;

        margin-bottom:40px;

    }



    /* TARJETAS CON MARGEN */

    .contenedor-modelos{

        display:flex;

        flex-direction:column;

        gap:35px;

        width:100%;

    }



    .modelo-card{

        width:100%;

        max-width:340px;

        margin:auto;

        border-radius:30px;

    }



    .modelo-card img{

        height:200px;

    }


    .modelo-card h3{

        font-size:1.5rem;

    }


}










/* ==================================
   VIDEO RESPONSIVE
================================== */

.video-container{

    width:100%;
    max-width:900px;
    margin:auto;
    padding:20px;
    text-align:center;

}


.video-container video{

    width:100%;
    border-radius:20px;

}


























/* ==========================================
   FOOTER
========================================== */

footer{

    background-image:url('img/footer.png');

    background-size:100% auto;

    background-position:center bottom;

    background-repeat:no-repeat;

    min-height:600px;

    height:250px;


    display:flex;

    flex-direction:column;

    justify-content:flex-end;

    align-items:center;


    padding-bottom:35px;


    text-align:center;

    font-size:2rem;

    font-weight:400;

    color:black;


}



/* TEXTO BLANCO DE ABAJO */

footer span{

    display:block;

    color:white;

    font-size:3rem;

    font-weight:800;

}





/* ==========================================
   FOOTER CELULAR
========================================== */

@media(max-width:600px){

footer{

    background-image:url('img/footer-cel.png');

    background-size:100% auto;

    min-height:260px;

    background-position:center bottom;

    padding-bottom:20px;

    font-size:0.9rem;

}



footer span{

    font-size:1.6rem;

}

}




























@keyframes palpitar{

    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(128,172,131,0.7);
    }

    70%{
        transform:scale(1.08);
        box-shadow:0 0 0 20px rgba(128,172,131,0);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(128,172,131,0);
    }

}















@media(max-width:768px){

    .contenedor-modelos{

        grid-template-columns:1fr;
    }

    .titulo-modelos{

        font-size:2.2rem;
    }


}




</style>



<!-- ==========================================













     HTML CODIGO











========================================== -->



</head>

<body>

<footer>

    <h3>Nos reservamos los derechos de autor</h3>

</footer>











































<script>

window.addEventListener('scroll',function(){

    const header = document.querySelector('header');

    if(window.scrollY > 50){

        header.style.padding = "5px 30px";
        header.style.background = "rgba(235, 227, 209)";
        header.style.boxShadow = "0 8px 25px rgba(0,0,0,.15)";

    }else{

        header.style.padding = "10px 30px";
        header.style.background = "rgba(242, 234, 208)";
        header.style.boxShadow = "0 2px 15px rgba(0,0,0,.08)";

    }

});















function girarVideo(){

    if(screen.orientation){

        screen.orientation.lock("landscape")
        .catch(error=>{
            console.log("No se pudo girar:", error);
        });

    }

}









const video = document.querySelector("video");


video.addEventListener("fullscreenchange", ()=>{

    if(document.fullscreenElement){

        if(screen.orientation){

            screen.orientation.lock("landscape");

        }

    }

});















</script>





</body>
</html>
