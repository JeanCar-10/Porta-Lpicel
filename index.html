<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LapiCels</title>

<!-- =========================
     FUENTES
========================= -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===================================================
   RESET GENERAL
=================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Baloo 2', cursive;

    background:#ffffff;

    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;

    left:0;
    top:150px;

    width:170px;
    height:calc(100vh - 80px);

    background-image:url('img/lapizgrandeizq.png');
    background-repeat:no-repeat;
    background-position:top left;
    background-size:contain;

    pointer-events:none;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;

    right:0;
    top:190px;

    width:170px;
    height:calc(100vh - 80px);

    background-image:url('img/lapizgrandeder.png');
    background-repeat:no-repeat;
    background-position:top right;
    background-size:contain;

    pointer-events:none;
    z-index:0;
}






html{
    scroll-behavior:smooth;
}





/* Todo el contenido encima */




/* ===================================================
   HEADER
=================================================== */
header{
    width:100%;
    background:#f9f2df;
    padding:10px 30px;



    position:fixed;

    top:0;
    left:0;

    width:100%;

    background:rgba(232, 223, 204);

    backdrop-filter:blur(8px);

    padding:10px 30px;

    z-index:99999;

    transition:all .35s ease;

    box-shadow:0 2px 15px rgba(0,0,0,.08);
}




.logo-container{
    display:flex;
    align-items:center;
    gap:18px;
}

.logo-container img{
    width:75px;
    height:auto;
}

.logo-container a{
    text-decoration:none;
    color:#5C5C43;
    font-size:3rem;
    font-weight:700;

}

/* ===================================================
   SECCIÓN PRINCIPAL
=================================================== */
.hero{
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:120px 20px 40px;
}


/* ===================================================
   IMÁGENES LATERALES
=================================================== */



/* ===================================================
   TÍTULO
=================================================== */

.titulo{
    font-size:5.5rem;
    line-height:0.95;
    font-weight:800;
    margin-bottom:60px;
}

.verde{
    color:#24b038;
}

.rosa{
    color:#f29bc5;
}

.amarillo{
    color:#efb544;
}

.rosafuerte{
    color:#df2b72;
}

.naranja{
    color:#f1732c;
}

.azul{
    color:#73add8;
}

/* ===================================================
   BOTÓN COMENZAMOS
=================================================== */

.btn-comenzar{
    text-decoration:none;

    background:#80ac83;
    color:white;

    font-size:2.4rem;
    font-weight:800;

    padding:18px 80px;

    border-radius:35px;

    transition:.3s;

    animation: palpitar 1.5s infinite;
}

.btn-comenzar:hover{
    transform:scale(1.08);
}



/* ===================================
   MODELOS
=================================== */

#modelos{

    padding:100px 20px 140px;

    background:#ffffff;

    text-align:center;
}

.titulo-modelos{

    font-size:3.5rem;

    margin-bottom:70px;

    color:black;

    font-weight:700;
}

.contenedor-modelos{

    max-width:1100px;

    margin:auto;

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:50px;
}

/* TARJETAS */

.modelo-card{

    background:#dddddd;

    border-radius:35px;

    overflow:hidden;

    cursor:pointer;

    animation: palpitarRayo 2s infinite;

    position:relative;

    z-index:2;


    text-decoration:none;
    color:black;
}

.modelo-card img{

    width:100%;

    height:230px;

    object-fit:cover;

    display:block;
}

.modelo-card h3{

    padding:18px;

    font-size:1.8rem;

    font-weight:700;
}

/* Animación */

@keyframes palpitarRayo{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.04);
    }

    100%{
        transform:scale(1);
    }

}

/* Hover */

.modelo-card:hover{

    transform:scale(1.08);

    transition:.3s;
}


/* ===================================
   FOOTER
=================================== */

footer{

    background:#9cab91;

    text-align:center;

    padding:28px 20px;

    font-size:2rem;

    font-weight:700;
}

footer span{

    color:white;
}






































/* Animación */
@keyframes palpitar{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* ===================================================
   RESPONSIVE TABLET
=================================================== */

@media(max-width:900px){

    .titulo{
        font-size:4rem;
    }

    .lapiz-iz,
    .lapiz-der{
        width:160px;
    }

    .btn-comenzar{
        font-size:2rem;
        padding:16px 60px;
    }

}

/* ===================================================
   RESPONSIVE CELULAR
=================================================== */

@media(max-width:650px){

    .logo-container img{
        width:55px;
    }

    .logo-container a{
        font-size:2rem;
    }

    .titulo{
        font-size:2.8rem;
        margin-bottom:40px;
    }

    .lapiz-iz{
        width:100px;
        left:-25px;
        top:120px;
    }

    .lapiz-der{
        width:100px;
        right:-25px;
        top:260px;
    }

    .btn-comenzar{
        font-size:1.4rem;
        padding:14px 35px;
    }



/* LAPICES LATERALES MAS PEQUEÑOS */

    body::before{

        width:90px;

        top:120px;

        left:-15px;

        background-size:contain;

    }


    body::after{

        width:90px;

        top:180px;

        right:-15px;

        background-size:contain;

    }



    /* PORTADA */

    .titulo{

        font-size:2.5rem;

        line-height:1.1;

        padding:0 50px;

    }


    .btn-comenzar{

        font-size:1.3rem;

        padding:15px 35px;

    }



    /* SECCION MODELOS */

    #modelos{

        padding:80px 25px;

    }


    .titulo-modelos{

        font-size:2rem;

        line-height:1.2;

        margin-bottom:40px;

    }



    /* TARJETAS CON MARGEN */

    .contenedor-modelos{

        display:flex;

        flex-direction:column;

        gap:35px;

        width:100%;

    }



    .modelo-card{

        width:100%;

        max-width:340px;

        margin:auto;

        border-radius:30px;

    }



    .modelo-card img{

        height:200px;

    }


    .modelo-card h3{

        font-size:1.5rem;

    }


}




































@keyframes palpitar{

    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(128,172,131,0.7);
    }

    70%{
        transform:scale(1.08);
        box-shadow:0 0 0 20px rgba(128,172,131,0);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(128,172,131,0);
    }

}















@media(max-width:768px){

    .contenedor-modelos{

        grid-template-columns:1fr;
    }

    .titulo-modelos{

        font-size:2.2rem;
    }


}




</style>



<!-- ==========================================













     HTML CODIGO











========================================== -->



</head>

<body>


<!-- ==========================================
     HEADER
========================================== -->
<header>

    <div class="logo-container">

        <img src="img/logo.png" alt="Logo">

        <a href="index.html">Porta LapiCel</a>

    </div>

</header>

<!-- ==========================================
     PORTADA
========================================== -->
<section class="hero" id="inicio-construccion">

    

    <h1 class="titulo">

        <span class="verde">Cons</span><span class="rosa">truye</span>

        <br>

        <span class="rosafuerte">Porta</span>
        <span class="naranja">Lapi</span><span class="azul">Cel</span>

    <a href="#modelos" class="btn-comenzar">

<!-- ==========================================

<section id="modelos">

    <h2 class="titulo-modelos">

    <div class="contenedor-modelos">

        <a href="rayo1.html" class="modelo-card">
            <img src="img/rayo1.jpg" alt="">

        <a href="rayo2.html" class="modelo-card">

        <a href="rayo3.html" class="modelo-card">
            <img src="img/rayo3.jpg" alt="">

        </a>

        <a href="rayo4.html" class="modelo-card">
            <img src="img/rayo4.jpg" alt="">
            <h3>Rayo 4</h3>
        </a>

        <a href="rayo5.html" class="modelo-card">
            <img src="img/rayo5.jpg" alt="">
            <h3>Rayo 5</h3>
        </a>

        <a href="rayo6.html" class="modelo-card">
            <img src="img/rayo6.jpg" alt="">

    </div>

</section>





<footer>

    Nos reservamos los derechos de autor

    <span>Los Audaces</span>

</footer>











































<script>

window.addEventListener('scroll',function(){

    const header = document.querySelector('header');

    if(window.scrollY > 50){

        header.style.padding = "5px 30px";
        header.style.background = "rgba(232, 223, 204)";
        header.style.boxShadow = "0 8px 25px rgba(0,0,0,.15)";

    }else{

        header.style.padding = "10px 30px";
        header.style.background = "rgba(242, 232, 213)";
        header.style.boxShadow = "0 2px 15px rgba(0,0,0,.08)";

    }

});

</script>





</body>
</html>
